<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets App</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F9FAFB;
            --text-color: #111827;
            --border-color: #E5E7EB;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 { margin-top: 0; color: var(--primary); }
        .form-container {
            background-color: var(--bg-color);
            padding: 20px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .input-group label {
            width: 150px;
            font-weight: 600;
        }
        input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }
        .search-container {
            margin-bottom: 20px;
        }
        #search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button.danger { background-color: #EF4444; }
        button.danger:hover { background-color: #DC2626; }
        button.secondary { background-color: #6B7280; }
        button.secondary:hover { background-color: #4B5563; }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            white-space: nowrap;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: var(--bg-color);
            font-weight: 600;
        }
        tr:hover { background-color: #F3F4F6; }
        .action-buttons { display: flex; gap: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Google Sheets Data</h1>
        
        <div class="form-container" id="add-form-container" style="display: none;">
            <h3 id="form-title" style="margin-top: 0;">Add New Record</h3>
            <form id="add-form"></form>
            <div style="margin-top: 15px;">
                <button id="submit-btn" onclick="submitData()">Submit</button>
                <button id="cancel-btn" class="secondary" onclick="cancelEdit()" style="display: none;">Cancel</button>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search records..." onkeyup="filterTable()">
        </div>

        <div class="table-responsive">
            <table>
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let sheetHeaders = [];
        let currentData = [];
        let editingRowNum = null;

        function loadData() {
            fetch('http://localhost:8000')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('table-body').innerHTML = `<tr><td colspan="100%" style="color:red">Error: ${data.error}</td></tr>`;
                        return;
                    }
                    
                    currentData = data;
                    sheetHeaders = data.length > 0 ? Object.keys(data[0]).filter(h => h !== '_row_num') : sheetHeaders;
                    
                    if (sheetHeaders.length > 0) {
                        document.getElementById('table-head').innerHTML = 
                            '<tr>' + sheetHeaders.map(h => `<th>${h}</th>`).join('') + '<th>Actions</th></tr>';
                        
                        renderTableBody(currentData);

                        document.getElementById('add-form-container').style.display = 'block';
                        document.getElementById('add-form').innerHTML = sheetHeaders.map(h => 
                            `<div class="input-group">
                                <label>${h}</label>
                                <input type="text" id="input-${h}">
                            </div>`
                        ).join('');
                    } else if (data.length === 0) {
                        document.getElementById('table-body').innerHTML = `<tr><td colspan="100%">No data found.</td></tr>`;
                    }
                });
        }

        function renderTableBody(dataToRender) {
            if (dataToRender.length === 0) {
                document.getElementById('table-body').innerHTML = `<tr><td colspan="100%">No matching records found.</td></tr>`;
                return;
            }
            
            document.getElementById('table-body').innerHTML = dataToRender.map(row => 
                '<tr>' + 
                sheetHeaders.map(h => `<td>${row[h]}</td>`).join('') + 
                `<td class="action-buttons">
                    <button onclick="editData(${row._row_num})">Edit</button>
                    <button class="danger" onclick="deleteData(${row._row_num})">Delete</button>
                </td>` +
                '</tr>'
            ).join('');
        }

        function filterTable() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filteredData = currentData.filter(row => {
                return sheetHeaders.some(h => String(row[h]).toLowerCase().includes(query));
            });
            renderTableBody(filteredData);
        }

        function submitData() {
            const newData = {};
            sheetHeaders.forEach(h => {
                newData[h] = document.getElementById(`input-${h}`).value;
            });

            let method = 'POST';
            if (editingRowNum) {
                newData['_row_num'] = editingRowNum;
                method = 'PUT';
            }

            fetch('http://localhost:8000', {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newData),
            })
            .then(response => response.json())
            .then(result => {
                if(result.status === 'success') {
                    document.getElementById('search-input').value = ''; 
                    loadData(); 
                    cancelEdit();
                } else {
                    alert('Error: ' + result.error);
                }
            });
        }

        function editData(rowNum) {
            const row = currentData.find(r => r._row_num === rowNum);
            sheetHeaders.forEach(h => {
                document.getElementById(`input-${h}`).value = row[h];
            });
            editingRowNum = rowNum;
            document.getElementById('form-title').innerText = "Edit Record";
            document.getElementById('submit-btn').innerText = "Update";
            document.getElementById('cancel-btn').style.display = "inline-block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingRowNum = null;
            document.getElementById('add-form').reset();
            document.getElementById('form-title').innerText = "Add New Record";
            document.getElementById('submit-btn').innerText = "Submit";
            document.getElementById('cancel-btn').style.display = "none";
        }

        function deleteData(rowNum) {
            if (!confirm("Are you sure you want to delete this row?")) return;

            fetch('http://localhost:8000', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ _row_num: rowNum }),
            })
            .then(response => response.json())
            .then(result => {
                if(result.status === 'success') {
                    document.getElementById('search-input').value = '';
                    loadData(); 
                } else {
                    alert('Error: ' + result.error);
                }
            });
        }

        loadData();
    </script>
</body>
</html>
